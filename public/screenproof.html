<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Screenproof</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Warm neutral dark — no blue/cyan cast */
  --bg: #0c0c0c;
  --surface: #141414;
  --surface-raised: #1a1a1a;
  --surface-hover: #1e1e1e;
  --surface-selected: rgba(255,255,255,0.04);
  --surface-glass: rgba(20,20,20,0.82);
  --border: rgba(255,255,255,0.055);
  --border-hover: rgba(255,255,255,0.09);
  --border-active: rgba(255,255,255,0.14);
  --text: #e8e8e6;
  --text-secondary: #a8a8a4;
  --text-muted: #6b6b68;
  --text-faint: #3d3d3b;
  /* Status — desaturated, refined */
  --pass: #6dd4a0;
  --pass-dim: rgba(109,212,160,0.08);
  --warn: #e8c560;
  --warn-dim: rgba(232,197,96,0.08);
  --fail: #e87070;
  --fail-dim: rgba(232,112,112,0.08);
  --absent: #8b8b88;
  --absent-dim: rgba(139,139,136,0.1);
  /* Structural */
  --radius: 10px;
  --radius-sm: 6px;
  --font-sans: "DM Sans", system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex; flex-direction: column; overflow: hidden;
}

/* --- Entrance animations --- */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
/* ============================================
   TOPBAR — thin, glassy, minimal
   ============================================ */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: var(--surface-glass);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  height: 46px;
  animation: fadeIn 0.25s ease-out;
}

.topbar h1 {
  font-size: 0.8125rem;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: -0.02em;
  color: var(--text-secondary);
}

.topbar-right { display: flex; align-items: center; gap: 1rem; margin-left: auto; }

.counts {
  display: flex; gap: 0.75rem;
  font-size: 0.6875rem;
  font-family: var(--font-mono);
  font-weight: 500;
  transition: opacity 0.15s ease;
}
.counts.updating { opacity: 0; }
.counts span {
  display: flex; align-items: center; gap: 0.3rem;
  color: var(--text-muted);
}

.dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.dot.fail { background: var(--fail); }
.dot.warn { background: var(--warn); }
.dot.pass { background: var(--pass); }

.btn {
  padding: 0.4rem 1rem;
  font-size: 0.6875rem;
  font-weight: 500;
  font-family: var(--font-sans);
  border: 1px solid var(--border-hover);
  background: var(--surface-raised);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.18s ease;
  white-space: nowrap;
  min-width: 110px;
  text-align: center;
  letter-spacing: 0.005em;
}
.btn:hover {
  border-color: var(--border-active);
  color: var(--text);
  background: var(--surface-hover);
}
.btn:active { transform: scale(0.97); }
.btn.running {
  color: var(--text-muted);
  border-color: var(--border);
  pointer-events: none;
  background: linear-gradient(90deg, var(--surface-raised), var(--surface-hover), var(--surface-raised));
  background-size: 200% 100%;
  animation: shimmer 1.8s linear infinite;
}

/* ============================================
   FILTER TABS — understated, weight-driven
   ============================================ */
.filters {
  display: flex; gap: 1px; padding: 0.4rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.25s ease-out 0.04s both;
}
.filters button {
  font-family: var(--font-sans);
  font-size: 0.6875rem;
  font-weight: 400;
  padding: 0.3rem 0.75rem;
  border-radius: var(--radius-sm);
  border: none;
  background: none;
  color: var(--text-faint);
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.01em;
}
.filters button:hover {
  color: var(--text-muted);
}
.filters button.on {
  color: var(--text);
  font-weight: 600;
  background: rgba(255,255,255,0.04);
}
.search-box {
  margin-left: auto;
  position: relative;
}
.search-box input {
  font-family: var(--font-sans);
  font-size: 0.6875rem;
  padding: 0.3rem 0.6rem 0.3rem 1.6rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface-raised);
  color: var(--text);
  outline: none;
  width: 180px;
  transition: border-color 0.15s ease, width 0.2s ease;
}
.search-box input:focus {
  border-color: var(--border-active);
  width: 240px;
}
.search-box input::placeholder { color: var(--text-faint); }
.search-box::before {
  content: "⌕";
  position: absolute;
  left: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem;
  color: var(--text-faint);
  pointer-events: none;
}
.path-nav {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
.path-nav input {
  width: 190px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.02);
  color: var(--text);
  font-size: 0.6875rem;
  font-family: var(--font-mono);
  padding: 0 0.5rem;
}
.path-nav input:focus {
  outline: none;
  border-color: var(--border-active);
}
.path-nav button {
  height: 28px;
  padding: 0 0.55rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.625rem;
  font-family: var(--font-mono);
  cursor: pointer;
}
.path-nav button:hover {
  border-color: var(--border-active);
  color: var(--text);
}

/* --- LAYOUT --- */
.main { display: flex; flex: 1; overflow: hidden; }

/* ============================================
   CARDS PANEL (SIDEBAR)
   — generous padding, subtle left-edge indicator
   ============================================ */
.cards-panel {
  width: 290px; min-width: 250px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
  display: flex; flex-direction: column;
  animation: slideInLeft 0.25s ease-out 0.08s both;
}
.cards-panel::-webkit-scrollbar { width: 3px; }
.cards-panel::-webkit-scrollbar-track { background: transparent; }
.cards-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
.cards-panel::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }

.card {
  padding: 0.875rem 1rem 0.875rem 1.125rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s ease;
  display: flex; align-items: flex-start; gap: 0.75rem;
  position: relative;
}
.card::before {
  content: "";
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 2px;
  border-radius: 1px;
  background: transparent;
  transition: background 0.15s ease;
}
.card:hover {
  background: var(--surface-hover);
}
.card.selected {
  background: var(--surface-selected);
}
.card.selected::before {
  background: var(--text-secondary);
}

.card-badge {
  font-size: 0.5625rem;
  font-weight: 600;
  font-family: var(--font-mono);
  text-transform: uppercase;
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 0.05rem;
  letter-spacing: 0.04em;
}
.card-badge.fail { background: var(--fail-dim); color: var(--fail); }
.card-badge.warn { background: var(--warn-dim); color: var(--warn); }
.card-badge.pass { background: var(--pass-dim); color: var(--pass); }

.card-info { flex: 1; min-width: 0; }
.card-label {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  letter-spacing: -0.01em;
}
.card-text {
  font-size: 0.6875rem;
  color: var(--text-faint);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 0.25rem;
  line-height: 1.4;
}
.card-meta {
  font-size: 0.625rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
  font-family: var(--font-mono);
  letter-spacing: 0.01em;
}

/* ============================================
   CANVAS PANEL — clean header
   ============================================ */
.canvas-panel {
  display: flex; flex-direction: column; flex: 1; overflow: hidden;
  animation: fadeIn 0.3s ease-out 0.12s both;
}
.canvas-header {
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--surface);
  min-height: 46px;
}
.canvas-heading {
  display: flex;
  min-width: 0;
  flex: 1;
  flex-direction: column;
  gap: 0.2rem;
}
.canvas-title {
  font-size: 0.875rem;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: -0.015em;
  color: var(--text);
}
.canvas-meta {
  min-height: 1rem;
  font-family: var(--font-mono);
  font-size: 0.625rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.canvas-meta .fail { color: var(--fail); }
.canvas-meta .warn { color: var(--warn); }
.canvas-meta .pass { color: var(--pass); }
.canvas-meta .absent { color: var(--absent); }
.canvas-nav {
  display: flex; align-items: center; gap: 0.5rem;
  flex-shrink: 0;
  font-size: 0.6875rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.canvas-nav button {
  width: 28px; height: 28px; padding: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  font-size: 0.75rem;
  font-family: var(--font-sans);
}
.canvas-nav button:hover {
  border-color: var(--border-active);
  color: var(--text);
  background: var(--surface-hover);
}
.canvas-nav button:disabled { opacity: 0.2; cursor: not-allowed; }
.canvas-nav button:disabled:hover { border-color: var(--border); color: var(--text-muted); background: transparent; }

/* --- VIEWPORT NAV ARROWS (left/right on canvas edges) --- */
.viewport-nav-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border-hover);
  background: var(--surface-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-secondary);
  font-size: 1.25rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  opacity: 0.7;
}
.viewport-nav-arrow:hover {
  opacity: 1;
  background: var(--surface-raised);
  border-color: var(--border-active);
  color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.viewport-nav-arrow:active { transform: translateY(-50%) scale(0.92); }
.viewport-nav-arrow.left { left: 1rem; }
.viewport-nav-arrow.right { right: 1rem; }
.viewport-nav-arrow:disabled { opacity: 0.15; cursor: not-allowed; pointer-events: none; }
.viewport-nav-arrow .arrow-key-hint {
  position: absolute;
  bottom: -18px;
  font-size: 0.5rem;
  font-family: var(--font-mono);
  color: var(--text-faint);
  letter-spacing: 0.05em;
}

/* --- VIEWPORT --- */
.canvas-viewport {
  flex: 1; overflow: auto;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 1rem;
  position: relative;
  background:
    radial-gradient(circle 1px at center, rgba(255,255,255,0.04) 0%, transparent 100%);
  background-size: 24px 24px;
  background-color: var(--bg);
  position: relative;
}
.canvas-viewport::-webkit-scrollbar { width: 8px; height: 8px; }
.canvas-viewport::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 999px; }

.viewport-empty {
  color: var(--text-faint);
  font-size: 0.875rem;
  text-align: center;
  line-height: 1.8;
  font-weight: 400;
  letter-spacing: -0.005em;
}

.viewport-frame {
  position: relative;
  background: var(--bg);
  overflow: hidden;
  border-radius: var(--radius);
  box-shadow:
    0 0 0 1px var(--border),
    0 8px 40px rgba(0,0,0,0.35),
    0 2px 8px rgba(0,0,0,0.2);
  transition: box-shadow 0.25s ease;
}
.viewport-frame:hover {
  box-shadow:
    0 0 0 1px var(--border-hover),
    0 12px 48px rgba(0,0,0,0.45),
    0 4px 12px rgba(0,0,0,0.25);
}
.viewport-frame iframe { border: none; display: block; transform-origin: top left; }

/* ============================================
   DEVICE BAR — pill buttons, clean row
   ============================================ */
.device-bar {
  display: flex; gap: 0.375rem; padding: 0.625rem 1.25rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
  overflow-x: auto;
  align-items: center;
}
.device-bar::-webkit-scrollbar { height: 2px; }
.device-bar::-webkit-scrollbar-track { background: transparent; }
.device-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.device-btn {
  padding: 0.375rem 0.75rem;
  font-family: var(--font-mono);
  font-size: 0.625rem;
  font-weight: 500;
  white-space: nowrap;
  border: 1px solid transparent;
  background: none;
  color: var(--text-faint);
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  letter-spacing: 0.01em;
}
.device-btn:hover {
  color: var(--text-secondary);
  background: rgba(255,255,255,0.03);
}
.device-btn.active {
  color: var(--text);
  background: rgba(255,255,255,0.08);
  font-weight: 600;
}
.device-btn .status-dot {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; margin-right: 0.3rem; vertical-align: middle;
}

/* --- HIDDEN IFRAME --- */
#measure-frame { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

/* --- DEVICE TYPE BADGE --- */
.device-type-badge {
  font-size: 0.5625rem;
  font-weight: 500;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.15rem 0.45rem;
  border-radius: 4px;
  margin-left: 0.5rem;
  flex-shrink: 0;
}
.device-type-badge.touch { background: rgba(255,255,255,0.04); color: var(--text-muted); }
.device-type-badge.mouse { background: rgba(255,255,255,0.03); color: var(--text-faint); }

/* --- TOUCH OVERLAY --- */
.touch-overlay {
  position: absolute; inset: 0; z-index: 10;
  pointer-events: auto;
  cursor: none; touch-action: none;
}
.touch-cursor {
  position: fixed; pointer-events: none; z-index: 100;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  transform: translate(-50%, -50%);
  transition: transform 0.06s ease-out, background 0.1s, border-color 0.1s;
  display: none;
}
.touch-cursor.visible { display: block; }
.touch-cursor.pressed {
  transform: translate(-50%, -50%) scale(0.78);
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
}

.tap-ripple {
  position: fixed; pointer-events: none; z-index: 99;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  transform: translate(-50%, -50%) scale(0);
  animation: ripple-expand 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}
@keyframes ripple-expand {
  0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
  100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
}

/* --- MOUSE OVERLAY --- */
.mouse-overlay { pointer-events: none; }

/* --- Card entrance stagger --- */
.card { animation: fadeUp 0.18s ease-out both; }
.card:nth-child(1)  { animation-delay: 0.02s; }
.card:nth-child(2)  { animation-delay: 0.04s; }
.card:nth-child(3)  { animation-delay: 0.06s; }
.card:nth-child(4)  { animation-delay: 0.08s; }
.card:nth-child(5)  { animation-delay: 0.1s; }
.card:nth-child(6)  { animation-delay: 0.12s; }
.card:nth-child(7)  { animation-delay: 0.14s; }
.card:nth-child(8)  { animation-delay: 0.16s; }
.card:nth-child(9)  { animation-delay: 0.18s; }
.card:nth-child(10) { animation-delay: 0.2s; }
.card:nth-child(n+11) { animation-delay: 0.2s; }

/* Smooth refresh — fade cards out/in instead of hard replace */
.cards-panel.refreshing { opacity: 0; transition: opacity 0.08s ease; }
.cards-panel.revealing  { opacity: 1; transition: opacity 0.15s ease 0.02s; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Screenproof</h1>
  <div class="topbar-right">
    <div class="counts" id="counts"></div>
    <button class="btn" id="runBtn">Generate Report</button>
  </div>
</div>

<div class="filters" id="filters">
  <button data-filter="fail">fail</button>
  <button data-filter="warn">warn</button>
  <button data-filter="pass">pass</button>
  <button class="on" data-filter="all">all</button>
  <button data-filter="nav">nav</button>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Search text..." /></div>
</div>

<div class="main">
  <div class="cards-panel" id="cardsList"></div>

    <div class="canvas-panel">
      <div class="canvas-header">
      <div class="canvas-heading">
        <div class="canvas-title" id="canvasTitle">Select a check to preview</div>
        <div class="canvas-meta" id="canvasMeta"></div>
      </div>
        <div class="canvas-nav">
          <div class="path-nav">
            <input id="pathInput" type="text" value="/" placeholder="/about" />
            <button id="openPathBtn">go</button>
          </div>
          <div class="path-nav">
            <button id="zoomOutBtn" title="Zoom out">-</button>
            <button id="zoomResetBtn" title="Reset zoom">100%</button>
            <button id="zoomInBtn" title="Zoom in">+</button>
          </div>
          <button id="prevDevice" disabled>&larr;</button>
          <span id="deviceLabel"></span>
          <button id="nextDevice" disabled>&rarr;</button>
        </div>
      </div>
    <div class="canvas-viewport" id="viewport">
      <button class="viewport-nav-arrow left" id="vpNavLeft" disabled>‹<span class="arrow-key-hint">←</span></button>
      <button class="viewport-nav-arrow right" id="vpNavRight" disabled>›<span class="arrow-key-hint">→</span></button>
      <div class="viewport-empty">Loading preview...</div>
    </div>
    <div class="device-bar" id="deviceBar"></div>
  </div>
</div>

<script type="module">
const TARGET = location.origin;

let data = null;
let activeFilter = "all";
let searchQuery = "";
let selectedIdx = null;
let deviceIdx = 0;
let viewportZoom = 1;
let fontsLoaded = false;
let frameEl = null;
let overlayEl = null;
let currentFramePage = null;
let currentCheckKey = null;
const pageScrollPositions = new Map();

// --- Device height lookup (common device heights for width→height mapping) ---
const DEVICE_HEIGHTS = {
  375: 667,   // iPhone SE
  390: 844,   // iPhone 14
  412: 915,   // Android mid
  430: 932,   // iPhone Pro Max
  768: 1024,  // Tablet portrait
  1024: 768,  // Tablet landscape
  1280: 800,  // Laptop 13"
  1440: 900,  // Laptop 14"
  1536: 960,  // Laptop 16"
  1920: 1080, // Desktop
};
const DEFAULT_HEIGHT = 900;
function deviceHeight(width) { return DEVICE_HEIGHTS[width] || DEFAULT_HEIGHT; }

// --- Device input type classification ---
// Touch: mobile + tablet viewports. Mouse: desktop viewports.
const TOUCH_THRESHOLD = 1024;
function inputTypeForWidth(w) { return w <= TOUCH_THRESHOLD ? "touch" : "mouse"; }

// --- Touch cursor element (persistent, reused across renders) ---
const touchCursorEl = document.createElement("div");
touchCursorEl.className = "touch-cursor";
document.body.appendChild(touchCursorEl);

function setupTouchOverlay(overlayEl, frameEl, scale) {
  let pressed = false;
  let activePointerId = null;
  let dragStart = null;
  let scrollStart = null;
  let movedWhilePressed = false;
  let pointerEventsSeen = false;

  function onPressStart(e) {
    pressed = true;
    movedWhilePressed = false;
    touchCursorEl.classList.add("pressed");
    dragStart = { x: e.clientX, y: e.clientY };
    try { scrollStart = { x: frameEl.contentWindow.scrollX, y: frameEl.contentWindow.scrollY }; } catch { scrollStart = null; }
    forwardTouchToIframe(e, frameEl, scale, "touchstart");
  }

  function onPressMove(e) {
    touchCursorEl.style.left = e.clientX + "px";
    touchCursorEl.style.top = e.clientY + "px";
    if (pressed && dragStart && scrollStart) {
      const movedX = Math.abs(e.clientX - dragStart.x);
      const movedY = Math.abs(e.clientY - dragStart.y);
      if (movedX > 4 || movedY > 4) movedWhilePressed = true;
      const dx = (dragStart.x - e.clientX) / scale;
      const dy = (dragStart.y - e.clientY) / scale;
      try { frameEl.contentWindow.scrollTo(scrollStart.x + dx, scrollStart.y + dy); } catch {}
      forwardTouchToIframe(e, frameEl, scale, "touchmove");
    }
  }

  function onPressEnd(e) {
    if (!pressed) return;
    pressed = false;
    touchCursorEl.classList.remove("pressed");
    forwardTouchToIframe(e, frameEl, scale, "touchend");
    dragStart = null;
    scrollStart = null;

    const ripple = document.createElement("div");
    ripple.className = "tap-ripple";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    document.body.appendChild(ripple);
    ripple.addEventListener("animationend", () => ripple.remove());
  }

  // --- Visual cursor (finger dot) tracking ---
  // This only drives the visual indicator — NO events are forwarded on hover.
  // Touch devices have zero hover capability: finger proximity is not
  // exposed as a browser event (capacitive sensing stays in firmware).
  overlayEl.addEventListener("mouseenter", () => {
    touchCursorEl.classList.add("visible");
  });
  overlayEl.addEventListener("mouseleave", () => {
    touchCursorEl.classList.remove("visible", "pressed");
    pressed = false;
    dragStart = null;
    scrollStart = null;
  });
  // Pointer-first path: works for mouse, touch, and pen.
  overlayEl.addEventListener("pointerdown", (e) => {
    pointerEventsSeen = true;
    if (e.button !== 0) return;
    activePointerId = e.pointerId;
    try { overlayEl.setPointerCapture(e.pointerId); } catch {}
    onPressStart(e);
  });
  overlayEl.addEventListener("pointermove", (e) => {
    pointerEventsSeen = true;
    if (activePointerId !== null && e.pointerId !== activePointerId) return;
    onPressMove(e);
  });
  overlayEl.addEventListener("pointerup", (e) => {
    pointerEventsSeen = true;
    if (activePointerId !== null && e.pointerId !== activePointerId) return;
    onPressEnd(e);
    activePointerId = null;
    try { overlayEl.releasePointerCapture(e.pointerId); } catch {}
  });
  overlayEl.addEventListener("pointercancel", (e) => {
    pointerEventsSeen = true;
    if (activePointerId !== null && e.pointerId !== activePointerId) return;
    onPressEnd(e);
    activePointerId = null;
    try { overlayEl.releasePointerCapture(e.pointerId); } catch {}
  });

  // Mouse fallback for environments that do not emit PointerEvents.
  overlayEl.addEventListener("mousemove", (e) => {
    if (pointerEventsSeen) return;
    onPressMove(e);
  });
  overlayEl.addEventListener("mousedown", (e) => {
    if (pointerEventsSeen) return;
    onPressStart(e);
  });
  overlayEl.addEventListener("mouseup", (e) => {
    if (pointerEventsSeen) return;
    onPressEnd(e);
  });

  // Some environments (especially true touch inputs) don't surface mousedown/up
  // the same way. Forward click directly so tap activation is reliable.
  overlayEl.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    forwardTapClickToIframe(e, frameEl, scale);
    movedWhilePressed = false;
  });

  // --- Block all hover-generating events from reaching the iframe ---
  // The overlay intercepts these; nothing hover-related propagates.
  for (const evt of ["mouseover", "mouseenter", "mousemove", "pointerover", "pointerenter", "pointermove"]) {
    overlayEl.addEventListener(evt, (e) => { e.stopPropagation(); });
  }

  // --- Wheel → scroll the iframe content ---
  // Drop pointer-events on overlay so the wheel event falls through to the
  // iframe natively. Re-enable on next frame. This is the only reliable way
  // to scroll a (potentially cross-origin) iframe from an overlay.
  overlayEl.addEventListener("wheel", (e) => {
    e.preventDefault();
    try {
      frameEl.contentWindow.scrollBy({
        left: e.deltaX / scale,
        top: e.deltaY / scale,
        behavior: "auto",
      });
    } catch {}
  });
}

function forwardTapClickToIframe(mouseEvt, frameEl, scale) {
  try {
    const doc = frameEl.contentDocument;
    if (!doc) return;
    const rect = frameEl.getBoundingClientRect();
    const x = (mouseEvt.clientX - rect.left) / scale;
    const y = (mouseEvt.clientY - rect.top) / scale;
    const target = doc.elementFromPoint(x, y);
    if (!target || target.nodeType !== 1) return;

    const activatable = target.closest("a,button,[role='button'],input,select,textarea,summary,label");
    const el = activatable || target;
    if (typeof el.click === "function") {
      el.click();
      return;
    }

    el.dispatchEvent(new MouseEvent("click", {
      bubbles: true,
      cancelable: true,
      clientX: x,
      clientY: y,
      view: doc.defaultView,
    }));
  } catch {}
}

// Dispatch real TouchEvent into iframe (same-origin) or degrade silently (cross-origin).
// Touch events never trigger :hover — this is the key difference from PointerEvent/MouseEvent.
function forwardTouchToIframe(mouseEvt, frameEl, scale, type) {
  try {
    const doc = frameEl.contentDocument;
    if (!doc) return;
    const rect = frameEl.getBoundingClientRect();
    const x = (mouseEvt.clientX - rect.left) / scale;
    const y = (mouseEvt.clientY - rect.top) / scale;
    const target = doc.elementFromPoint(x, y);
    if (!target) return;

    const touch = new Touch({
      identifier: 0,
      target: target,
      clientX: x,
      clientY: y,
      pageX: x + (doc.defaultView?.scrollX || 0),
      pageY: y + (doc.defaultView?.scrollY || 0),
    });

    const touchEvt = new TouchEvent(type, {
      bubbles: true,
      cancelable: true,
      touches: type === "touchend" ? [] : [touch],
      targetTouches: type === "touchend" ? [] : [touch],
      changedTouches: [touch],
    });
    target.dispatchEvent(touchEvt);
  } catch { /* cross-origin — visual-only simulation */ }
}

const zoomInBtnEl = document.getElementById("zoomInBtn");
const HIGHLIGHT_STYLE_ID = "pretext-highlight-style";
const HIGHLIGHT_CLASS = "pretext-highlight-target";
let highlightedEl = null;

const ZOOM_MIN = 0.5;
const ZOOM_MAX = 3;

function clampZoom(value) {
  return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, value));
}

function updateZoomLabel() {
  if (!zoomResetBtnEl) return;
  zoomResetBtnEl.textContent = Math.round(viewportZoom * 100) + "%";
}

function setViewportZoom(nextZoom) {
  const z = clampZoom(nextZoom);
  if (Math.abs(z - viewportZoom) < 0.001) return;
  viewportZoom = z;
  updateZoomLabel();
  if (selectedIdx !== null) renderDetail();
  else render();
}

function selectionKey(check) {
  return check.page + "::" + check.label + "::" + check.text;
}

function normalizeText(value) {
  return (value || "").replace(/\s+/g, " ").trim().toLowerCase();
}

function normalizePath(value) {
  const raw = (value || "").trim();
  if (!raw) return "/";
  if (/^https?:\/\//i.test(raw)) {
    try {
      const u = new URL(raw);
      return u.pathname + (u.search || "") + (u.hash || "");
    } catch {
      return "/";
    }
  }
  return raw.startsWith("/") ? raw : "/" + raw;
}

function saveCurrentScrollPosition() {
  if (!frameEl || !currentFramePage) return;
  try {
    pageScrollPositions.set(currentFramePage, {
      x: frameEl.contentWindow.scrollX,
      y: frameEl.contentWindow.scrollY,
    });
  } catch {}
}

function restoreScrollPosition(page) {
  if (!frameEl) return false;
  const saved = pageScrollPositions.get(page);
  if (!saved) return false;
  try {
    frameEl.contentWindow.scrollTo(saved.x, saved.y);
    return true;
  } catch {
    return false;
  }
}

function ensureHighlightStyles(doc) {
  if (doc.getElementById(HIGHLIGHT_STYLE_ID)) return;
  const style = doc.createElement("style");
  style.id = HIGHLIGHT_STYLE_ID;
  style.textContent =
    "." + HIGHLIGHT_CLASS + "{" +
      "outline:3px solid rgba(251,113,133,0.92)!important;" +
      "outline-offset:4px!important;" +
      "box-shadow:0 0 0 9999px rgba(251,113,133,0.08),0 0 0 8px rgba(251,113,133,0.18)!important;" +
      "border-radius:8px!important;" +
      "transition:box-shadow 120ms ease, outline-color 120ms ease;" +
    "}";
  doc.head.appendChild(style);
}

function findBestMatchElement(doc, targetText, root = null) {
  const wanted = normalizeText(targetText);
  if (!wanted) return null;

  const searchRoot = root || doc.body;
  const walker = doc.createTreeWalker(searchRoot, NodeFilter.SHOW_ELEMENT);
  let deepest = null;

  while (walker.nextNode()) {
    const el = walker.currentNode;
    if (el.nodeType !== 1) continue;
    const text = normalizeText(el.innerText || el.textContent || "");
    if (!text) continue;
    if (text === wanted) deepest = el; // keep overwriting — last exact match is deepest
  }

  return deepest;
}

function findCheckElement(doc, target) {
  if (target.selector) {
    try {
      const selected = doc.querySelector(target.selector);
      if (selected) {
        if (!target.text) return selected;
        const byText = findBestMatchElement(doc, target.text, selected);
        return byText || selected;
      }
    } catch {}
  }
  if (!target.text) return null;
  return findBestMatchElement(doc, target.text);
}

function clearHighlightedCheck() {
  if (highlightedEl) highlightedEl.classList.remove(HIGHLIGHT_CLASS);
  highlightedEl = null;
}

function highlightCheckElement(target) {
  if (!frameEl) return false;
  try {
    const doc = frameEl.contentDocument;
    if (!doc?.body) return false;
    ensureHighlightStyles(doc);
    clearHighlightedCheck();
    const match = findCheckElement(doc, target);
    if (!match) return false;
    match.classList.add(HIGHLIGHT_CLASS);
    highlightedEl = match;
    return true;
  } catch {
    return false;
  }
}

function scrollCheckIntoView(target) {
  if (!frameEl) return false;
  try {
    const doc = frameEl.contentDocument;
    if (!doc?.body) return false;
    const match = findCheckElement(doc, target);
    if (!match) return false;
    highlightCheckElement(target);
    const top = Math.max(0, match.getBoundingClientRect().top + frameEl.contentWindow.scrollY - 120);
    frameEl.contentWindow.scrollTo({ top, behavior: "auto" });
    return true;
  } catch {
    return false;
  }
}

function syncSelectedCard() {

    card.classList.toggle("selected", isSelected);

function ensureViewportFrame() {
  if (frameEl && overlayEl) return;

  viewportEl.innerHTML =
    '<div class="viewport-frame">' +
      '<iframe loading="lazy"></iframe>' +
      '<div class="mouse-overlay"></div>' +
    '</div>';

  frameEl = viewportEl.querySelector("iframe");
  overlayEl = viewportEl.querySelector(".viewport-frame > div");
}

function updateViewportFrame(check, dev) {
  ensureViewportFrame();

  const devH = deviceHeight(dev.width);
  const vpRect = viewportEl.getBoundingClientRect();
  const maxW = Math.max(320, vpRect.width - 32);
  const maxH = Math.max(480, vpRect.height - 32);
  const fitScale = Math.min(1, maxW / dev.width, maxH / devH);
  const scale = fitScale * viewportZoom;
  const scaledW = Math.round(dev.width * scale);
  const scaledH = Math.round(devH * scale);
  const devInputType = inputTypeForWidth(dev.width);

  const frameWrap = viewportEl.querySelector(".viewport-frame");
  frameWrap.style.width = scaledW + "px";
  frameWrap.style.height = scaledH + "px";

  frameEl.style.width = dev.width + "px";
  frameEl.style.height = devH + "px";
  frameEl.style.transform = "scale(" + scale + ")";

  const nextOverlay = document.createElement("div");
  nextOverlay.className = devInputType === "touch" ? "touch-overlay" : "mouse-overlay";
  overlayEl.replaceWith(nextOverlay);
  overlayEl = nextOverlay;

  if (devInputType === "touch") {
    setupTouchOverlay(overlayEl, frameEl, scale);
    injectTouchModeStyles(frameEl);
  } else {
    touchCursorEl.classList.remove("visible");
    removeTouchModeStyles(frameEl);
  }

  return { devInputType };
}

// Inject CSS into iframe to suppress mouse-following effects (flashlight, hover)
// on touch viewports. The overlay blocks pointer events, but page-load JS may
// still initialise cursor-followers — this neutralises them inside the document.
const TOUCH_MODE_STYLE_ID = "viewport-preview-touch-mode";
function injectTouchModeStyles(frame) {
  try {
    const doc = frame.contentDocument;
    if (!doc || doc.getElementById(TOUCH_MODE_STYLE_ID)) return;
    const s = doc.createElement("style");
    s.id = TOUCH_MODE_STYLE_ID;
    s.textContent =
      "*, *::before, *::after { cursor: none !important; }" +
      "[data-flashlight], .flashlight, .cursor-glow, .mouse-follower " +
      "{ display: none !important; opacity: 0 !important; pointer-events: none !important; }";
    doc.head.appendChild(s);
  } catch { /* cross-origin — overlay still blocks events */ }
}
function removeTouchModeStyles(frame) {
  try {
    const el = frame.contentDocument?.getElementById(TOUCH_MODE_STYLE_ID);
    if (el) el.remove();
  } catch {}
}
// --- Load fonts + Google Fonts link on first config fetch ---
async function ensureFonts(config) {
  if (fontsLoaded) return;
  if (config.googleFontsUrl) {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = config.googleFontsUrl;
    document.head.appendChild(link);
  }
  const fontFaces = new Set();
  for (const ck of config.checks) {
    fontFaces.add(ck.fontWeight + ' 16px "' + ck.fontFamily + '"');
  }
  await Promise.all([...fontFaces].map(f => document.fonts.load(f)));
  fontsLoaded = true;
}

function classifyDeviceResult(check, metrics) {
  const overflowRatio = metrics.containerWidth > 0
    ? metrics.textWidth / metrics.containerWidth
    : Number.POSITIVE_INFINITY;

  if (metrics.error) {
    return {
      status: "FAIL",
      reason: "measurement-error",
      details: "Layout measurement threw.",
    };
  }

  if (!metrics.hasText) {
    return {
      status: "ABSENT",
      reason: "empty-text",
      details: "No text configured for this breakpoint.",
    };
  }

  if (check.noWrap) {
    if (metrics.textWidth > metrics.containerWidth) {
      return {
        status: check.overflowStatus || "FAIL",
        reason: "truncation",
        details: "Single-line text exceeds its available width.",
        overflowRatio,
      };
    }

    if (overflowRatio > (check.warnOverflowRatio || 0.9)) {
      return {
        status: "WARN",
        reason: "near-truncation",
        details: "Single-line text is close to clipping.",
        overflowRatio,
      };
    }

    return {
      status: "PASS",
      reason: "fits",
      details: "Single-line text fits its available width.",
      overflowRatio,
    };
  }

  const drift = metrics.lineCount - metrics.baselineLines;
  if (drift > 0) {
    return {
      status: check.wrapStatus || "WARN",
      reason: "line-wrap-drift",
      details: `Text uses ${drift} more line${drift === 1 ? "" : "s"} than desktop.`,
      lineDrift: drift,
    };
  }

  return {
    status: "PASS",
    reason: "baseline-match",
    details: "Text matches or improves on the desktop line count.",
    lineDrift: drift,
  };
}

function applyLetterSpacingToWidth(textWidth, text, fontSizePx, letterSpacingEm) {
  if (!text || !textWidth || !letterSpacingEm) return textWidth;
  const glyphs = [...String(text)].length;
  if (glyphs <= 1) return textWidth;
  return textWidth + (glyphs - 1) * fontSizePx * letterSpacingEm;
}

function measureAtFontSize(check, text, fontSizePx, containerWidth, lineHeightMultiplier) {
  const fontSize = fontSizePx + "px";
  const fontStr = check.fontWeight + " " + fontSize + " " + check.fontFamily;
  const lineHeightPx = fontSizePx * lineHeightMultiplier;
  const prepared = prepare(text, fontStr);

  if (check.noWrap) {
    const singleLine = layout(prepared, 99999, lineHeightPx);
    const rawWidth = singleLine.width || 0;
    return {
      fontSize,
      lineCount: text ? 1 : 0,
      textWidth: Math.round(
        applyLetterSpacingToWidth(
          rawWidth,
          text,
          fontSizePx,
          check.letterSpacingEm || 0
        )
      ),
    };
  }

  const result = layout(prepared, containerWidth, lineHeightPx);
  return {
    fontSize,
    lineCount: result.lineCount,
    textWidth: 0,
  };
}

function fitsAtBaseline(check, metrics, baselineLines, containerWidth, viewportWidth) {
  if (check.noWrap) {
    if (viewportWidth && metrics.textWidth > viewportWidth) return false;
    return metrics.textWidth <= containerWidth;
  }

  return metrics.lineCount <= baselineLines;
}

function findLargestFittingMeasurement(check, text, baseFontSizePx, minFontSizePx, containerWidth, lineHeightMultiplier, baselineLines, viewportWidth) {
  const baseMetrics = measureAtFontSize(check, text, baseFontSizePx, containerWidth, lineHeightMultiplier);
  if (!check.fitToBaseline || !text) {
    return { fontSizePx: baseFontSizePx, ...baseMetrics };
  }

  if (fitsAtBaseline(check, baseMetrics, baselineLines, containerWidth, viewportWidth)) {
    return { fontSizePx: baseFontSizePx, ...baseMetrics };
  }

  const lowFontSizePx = Math.min(minFontSizePx || baseFontSizePx, baseFontSizePx);
  const lowMetrics = measureAtFontSize(check, text, lowFontSizePx, containerWidth, lineHeightMultiplier);
  if (!fitsAtBaseline(check, lowMetrics, baselineLines, containerWidth, viewportWidth)) {
    return { fontSizePx: lowFontSizePx, ...lowMetrics };
  }

  let low = lowFontSizePx;
  let high = baseFontSizePx;
  let bestFontSizePx = lowFontSizePx;
  let bestMetrics = lowMetrics;

  for (let index = 0; index < 14; index += 1) {
    const mid = (low + high) / 2;
    const midMetrics = measureAtFontSize(check, text, mid, containerWidth, lineHeightMultiplier);
    if (fitsAtBaseline(check, midMetrics, baselineLines, containerWidth, viewportWidth)) {
      bestFontSizePx = mid;
      bestMetrics = midMetrics;
      low = mid;
    } else {
      high = mid;
    }
  }

  return { fontSizePx: bestFontSizePx, ...bestMetrics };
}

// --- Run pretext measurement locally in the browser ---
function runMeasurement(config) {
  const { breakpoints, checks } = config;
  const results = [];

  for (const ck of checks) {
    const lh = ck.lineHeight || 1.4;
    const dsk = ck.desktopResolved;
    const baselineText = dsk.text || "";
    const dskFontStr = ck.fontWeight + " " + dsk.fontSize + " " + ck.fontFamily;
    const dskLh = parseFloat(dsk.fontSize) * lh;

    let baselineLines;
    if (!baselineText) {
      baselineLines = 0;
    } else if (ck.noWrap) {
      baselineLines = 1;
    } else {
      const dskPrep = prepare(baselineText, dskFontStr);
      const dskResult = layout(dskPrep, dsk.containerWidth, dskLh);
      baselineLines = dskResult.lineCount;
    }

    const devices = [];
    for (let i = 0; i < breakpoints.length; i++) {
      const bp = breakpoints[i];
      const r = ck.resolved[i];
      const text = r.text || "";
      const baseFontSizePx = parseFloat(r.fontSize);

      let lc = 0, tw = 0;
      let classification;
      let appliedFontSize = r.fontSize;
      try {
        if (text) {
          const measurement = findLargestFittingMeasurement(
            ck,
            text,
            baseFontSizePx,
            ck.fitMinFontSize,
            r.containerWidth,
            lh,
            baselineLines,
            bp.width
          );
          lc = measurement.lineCount;
          tw = measurement.textWidth;
          appliedFontSize = measurement.fontSize;
        }
        classification = classifyDeviceResult(ck, {
          hasText: !!text,
          baselineLines,
          containerWidth: r.containerWidth,
          lineCount: lc,
          textWidth: tw,
        });
      } catch (e) {
        lc = -1;
        classification = classifyDeviceResult(ck, {
          hasText: !!text,
          baselineLines,
          containerWidth: r.containerWidth,
          lineCount: lc,
          textWidth: tw,
          error: e,
        });
      }

      devices.push({
        name: bp.name, width: bp.width, fontSize: appliedFontSize, configuredFontSize: r.fontSize,
        containerWidth: r.containerWidth, lineCount: lc,
        baselineLines, status: classification.status, reason: classification.reason,
        details: classification.details, lineDrift: classification.lineDrift ?? null,
        overflowRatio: classification.overflowRatio ?? null, textWidth: tw, text, selector: r.selector || ck.selector || null, noWrap: !!ck.noWrap,
      });
    }

    const worst = devices.some(d => d.status === "FAIL") ? "FAIL"
      : devices.some(d => d.status === "WARN") ? "WARN" : "PASS";

    results.push({
      label: ck.label, text: ck.text, page: ck.page || "/", selector: ck.selector || null,
      fontFamily: ck.fontFamily, baselineLines, worst, devices,
    });
  }

  results.sort((a, b) => ({ FAIL: 0, WARN: 1, PASS: 2 }[a.worst]) - ({ FAIL: 0, WARN: 1, PASS: 2 }[b.worst]));

  const fc = results.filter(r => r.worst === "FAIL").length;
  const wc = results.filter(r => r.worst === "WARN").length;
  const pc = results.filter(r => r.worst === "PASS").length;

  return {
    summary: { fail: fc, warn: wc, pass: pc, total: results.length, breakpoints: breakpoints.length },
    results,
  };
}

  if (searchQuery) {
    list = list.filter(r =>
      (r.text || "").toLowerCase().includes(searchQuery) ||
      (r.label || "").toLowerCase().includes(searchQuery) ||
      (r.page || "").toLowerCase().includes(searchQuery)
    );
  }
  return list;
}

function buildCardsHTML(list) {
  return list.map((r, i) => {
    const failDevices = r.devices.filter(d => d.status !== "PASS").length;
    const leadReason = r.devices.find(d => d.status !== "PASS")?.reason || "ok";
    return '<div class="card' + (i === selectedIdx ? ' selected' : '') + '" data-idx="' + i + '">' +
      '<span class="card-badge ' + r.worst.toLowerCase() + '">' + r.worst + '</span>' +
      '<div class="card-info">' +
        '<div class="card-label">' + r.label + '</div>' +
        '<div class="card-text">' + r.text + '</div>' +
        '<div class="card-meta">' + r.page + ' &middot; ' + failDevices + '/' + r.devices.length + ' devices &middot; ' + leadReason + '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

function dataHash() {
  if (!data) return null;
  return data.summary.fail + ":" + data.summary.warn + ":" + data.summary.pass + ":" + activeFilter + ":" + searchQuery;
}

function updateCounts() {
  if (!data) return;
  const { summary } = data;
  countsEl.innerHTML =
    '<span><span class="dot fail"></span>' + summary.fail + '</span>' +
    '<span><span class="dot warn"></span>' + summary.warn + '</span>' +
    '<span><span class="dot pass"></span>' + summary.pass + '</span>';
}

function wireCardClicks() {
  cardsEl.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      selectedIdx = parseInt(card.dataset.idx);
      deviceIdx = 0;
      syncSelectedCard();
      renderDetail();
    });
  });
}

function updateEmptyState() {
  ensureViewportFrame();
  if (!currentFramePage) {
    currentFramePage = "/";
    frameEl.onload = null;
    frameEl.src = TARGET + "/";
  }
  clearHighlightedCheck();
  deviceBarEl.innerHTML = "";
  titleEl.textContent = "No checks for current filter";
  canvasMetaEl.textContent = "";
  deviceLabelEl.textContent = "";
  prevBtn.disabled = true;
  nextBtn.disabled = true;
}

function manualDevices() {
  if (!data?.results?.length) return [];
  return data.results[0].devices || [];
}

function renderManualDeviceBar(devices) {
  if (!devices.length) {
    deviceBarEl.innerHTML = "";
    return;
  }
  const safeIdx = Math.max(0, Math.min(deviceIdx, devices.length - 1));
  deviceIdx = safeIdx;
  prevBtn.disabled = safeIdx === 0;
  nextBtn.disabled = safeIdx === devices.length - 1;
  const dev = devices[safeIdx];
  const devInputType = inputTypeForWidth(dev.width);
  deviceLabelEl.innerHTML = dev.name + " (" + dev.width + "px)" +
    '<span class="device-type-badge ' + devInputType + '">' +
    (devInputType === "touch" ? "Touch" : "Mouse") + '</span>';
  updateViewportFrame({ page: currentFramePage || "/" }, dev);

  deviceBarEl.innerHTML = devices.map((d, i) => {
    return '<button class="device-btn' + (i === safeIdx ? ' active' : '') + '" data-i="' + i + '">' +
      '<span class="status-dot" style="background:var(--text-muted)"></span>' + d.name +
      '</button>';
  }).join("");

  deviceBarEl.querySelectorAll(".device-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      deviceIdx = parseInt(btn.dataset.i);
      render();
    });
  });

  if (typeof updateVpNavArrows === "function") updateVpNavArrows();
}

function openManualPath(inputPath) {
  const path = normalizePath(inputPath);
  pathInputEl.value = path;
  ensureViewportFrame();
  saveCurrentScrollPosition();
  clearHighlightedCheck();
  currentCheckKey = null;
  currentFramePage = path;
  frameEl.onload = () => {
    const curDev = manualDevices()[deviceIdx];
    if (curDev && inputTypeForWidth(curDev.width) === "touch") injectTouchModeStyles(frameEl);
    restoreScrollPosition(path);
  };
  frameEl.src = TARGET + path;
}

function metricSummary(check, dev) {
  const status = dev.status.toLowerCase();
  const source = dev.selector ? "selector" : "text match";
  const fontNote = dev.configuredFontSize && dev.configuredFontSize !== dev.fontSize
    ? " &middot; fit " + dev.fontSize + " from " + dev.configuredFontSize
    : "";
  if (dev.noWrap) {
    return (
      '<span class="' + status + '">' + dev.status + "</span> " +
      "&middot; width " + dev.textWidth + "px in " + dev.containerWidth + "px" +
      fontNote +
      " &middot; " + dev.reason +
      " &middot; " + source
    );
  }
  const delta = dev.lineCount - dev.baselineLines;
  const drift = delta > 0 ? "+" + delta : String(delta);
  return (
    '<span class="' + status + '">' + dev.status + "</span> " +
    "&middot; " + dev.lineCount + " lines vs " + dev.baselineLines + " baseline" +
    " &middot; drift " + drift +
    fontNote +
    " &middot; " + dev.reason +
    " &middot; " + source
  );
}

// Instant render — for selection changes (no data change)
function render() {
  if (!data) return;
  const hash = dataHash();
  const list = filtered();
  const devices = manualDevices();

  // If data/filter changed, rebuild cards
  if (hash !== lastRenderedHash) {
    updateCounts();
    cardsEl.innerHTML = buildCardsHTML(list);
    wireCardClicks();
    lastRenderedHash = hash;
  } else {
    // Just update selection classes
    cardsEl.querySelectorAll(".card").forEach((card, i) => {
      card.classList.toggle("selected", i === selectedIdx);
    });
  }

  if (!list.length) {
    selectedIdx = null;
    deviceIdx = 0;
    updateEmptyState();
    renderManualDeviceBar(devices);
    pathInputEl.value = normalizePath(currentFramePage || "/");
    return;
  }

  if (selectedIdx === null || selectedIdx >= list.length) {
    if (activeFilter !== "nav") {
      selectedIdx = 0;
      deviceIdx = 0;
    }
  }

  if (selectedIdx !== null) {
    syncSelectedCard();
    renderDetail();
  } else {
    updateEmptyState();
    renderManualDeviceBar(devices);
    pathInputEl.value = normalizePath(currentFramePage || "/");
  }
}

// Smooth render — for data refreshes (fade out, swap, fade in)
function renderSmooth() {
  return new Promise(resolve => {
    // Fade out cards + counts
    cardsEl.classList.add("refreshing");
    cardsEl.classList.remove("revealing");
    countsEl.classList.add("updating");

    setTimeout(() => {
      // Swap content while faded out
      lastRenderedHash = null; // force rebuild
      render();

      // Fade back in
      cardsEl.classList.remove("refreshing");
      cardsEl.classList.add("revealing");
      countsEl.classList.remove("updating");

      setTimeout(() => {
        cardsEl.classList.remove("revealing");
        resolve();
      }, 180);
    }, 100);
  });
}

function renderDetail() {
  const list = filtered();
  const check = list[selectedIdx];
  if (!check) return;

  syncSelectedCard();
  titleEl.textContent = check.label;
  const nextSelectionKey = selectionKey(check);

  const dev = check.devices[deviceIdx];
  const targetRef = {
    selector: dev.selector || check.selector || null,
    text: dev.text || check.text || "",
  };
  prevBtn.disabled = deviceIdx === 0;
  nextBtn.disabled = deviceIdx === check.devices.length - 1;
  canvasMetaEl.innerHTML = metricSummary(check, dev);
  const devInputType = inputTypeForWidth(dev.width);
  pathInputEl.value = normalizePath(check.page || "/");
  deviceLabelEl.innerHTML = dev.name + " (" + dev.width + "px)" +
    '<span class="device-type-badge ' + devInputType + '">' +
    (devInputType === "touch" ? "Touch" : "Mouse") + '</span>';

  updateViewportFrame(check, dev);

  const pageChanged = currentFramePage !== check.page;
  const checkChanged = currentCheckKey !== nextSelectionKey;

  if (pageChanged) {
    saveCurrentScrollPosition();
    currentFramePage = check.page;
    currentCheckKey = nextSelectionKey;
    frameEl.onload = () => {
      if (inputTypeForWidth(dev.width) === "touch") injectTouchModeStyles(frameEl);
      highlightCheckElement(targetRef);
      const restored = restoreScrollPosition(check.page);
      if (!restored || checkChanged) scrollCheckIntoView(targetRef);
    };
    frameEl.src = TARGET + check.page;
  } else if (checkChanged) {
    currentCheckKey = nextSelectionKey;
    highlightCheckElement(targetRef);
    if (!scrollCheckIntoView(targetRef)) restoreScrollPosition(check.page);
  } else {
    highlightCheckElement(targetRef);
    scrollCheckIntoView(targetRef);
  }

  // Device bar
  deviceBarEl.innerHTML = check.devices.map((d, i) => {
    const color =
      d.status === "FAIL" ? "var(--fail)"
      : d.status === "WARN" ? "var(--warn)"
      : d.status === "ABSENT" ? "var(--absent)"
      : "var(--pass)";
    return '<button class="device-btn' + (i === deviceIdx ? ' active' : '') + '" data-i="' + i + '">' +
      '<span class="status-dot" style="background:' + color + '"></span>' +
      d.name +
    '</button>';
  }).join("");

  deviceBarEl.querySelectorAll(".device-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      deviceIdx = parseInt(btn.dataset.i);
      renderDetail();
    });
  });

  if (typeof updateVpNavArrows === "function") updateVpNavArrows();
}

// --- Keyboard nav ---
document.addEventListener("keydown", (e) => {
  const list = filtered();
  if (!list.length) return;

  if (e.key === "ArrowLeft" && selectedIdx !== null) {
    if (deviceIdx > 0) { deviceIdx--; renderDetail(); }
  } else if (e.key === "ArrowRight" && selectedIdx !== null) {
    const check = list[selectedIdx];
    if (deviceIdx < check.devices.length - 1) { deviceIdx++; renderDetail(); }
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    if (selectedIdx === null) { selectedIdx = 0; } else if (selectedIdx > 0) { selectedIdx--; }
    deviceIdx = 0; syncSelectedCard(); renderDetail();
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (selectedIdx === null) { selectedIdx = 0; } else if (selectedIdx < list.length - 1) { selectedIdx++; }
    deviceIdx = 0; syncSelectedCard(); renderDetail();
  } else if (e.key === "Escape") {
    selectedIdx = null; deviceIdx = 0; render();
  }
});

// --- Viewport nav arrows ---
const vpNavLeft = document.getElementById("vpNavLeft");
const vpNavRight = document.getElementById("vpNavRight");

function updateVpNavArrows() {
  const maxIdx = selectedIdx !== null
    ? (filtered()[selectedIdx]?.devices?.length || 1) - 1
    : (manualDevices().length || 1) - 1;
  vpNavLeft.disabled = deviceIdx <= 0;
  vpNavRight.disabled = deviceIdx >= maxIdx;
}

function goDevicePrev() {
  if (selectedIdx !== null) {
    if (deviceIdx > 0) { deviceIdx--; renderDetail(); }
  } else {
    if (deviceIdx > 0) { deviceIdx--; render(); }
  }
  updateVpNavArrows();
}

function goDeviceNext() {
  if (selectedIdx !== null) {
    const list = filtered();
    if (deviceIdx < list[selectedIdx].devices.length - 1) { deviceIdx++; renderDetail(); }
  } else {
    const devices = manualDevices();
    if (deviceIdx < devices.length - 1) { deviceIdx++; render(); }
  }
  updateVpNavArrows();
}

prevBtn.addEventListener("click", goDevicePrev);
nextBtn.addEventListener("click", goDeviceNext);
vpNavLeft.addEventListener("click", goDevicePrev);
vpNavRight.addEventListener("click", goDeviceNext);

openPathBtnEl.addEventListener("click", () => {
  selectedIdx = null;
  openManualPath(pathInputEl.value);
  render();
});

pathInputEl.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  selectedIdx = null;
  openManualPath(pathInputEl.value);
  render();
});

zoomOutBtnEl.addEventListener("click", () => {
  setViewportZoom(viewportZoom / 1.15);
});
zoomResetBtnEl.addEventListener("click", () => {
  setViewportZoom(1);
});
zoomInBtnEl.addEventListener("click", () => {
  setViewportZoom(viewportZoom * 1.15);
});

viewportEl.addEventListener("wheel", (e) => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.0015);
  setViewportZoom(viewportZoom * factor);
}, { passive: false });

// --- Initial load: run measurement immediately ---
(async () => {
  try {
    updateZoomLabel();
    ensureViewportFrame();
    frameEl.src = TARGET + "/";
    currentFramePage = "/";
    pathInputEl.value = "/";
    runBtn.textContent = "Refreshing...";
    runBtn.classList.add("running");
    const resp = await fetch("./results.json");
    data = await resp.json();
    await renderSmooth();
  } catch (e) {
    countsEl.innerHTML = '<span style="color:var(--fail)">Error: ' + e.message + '</span>';
  }
  runBtn.textContent = "Refresh Report";
  runBtn.classList.remove("running");
})();
</script>
</body>
</html>
